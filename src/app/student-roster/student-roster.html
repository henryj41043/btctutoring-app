<div class="student-roster">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Student Roster</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="rosterStudents" class="mat-elevation-z8">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let item">{{item.name}}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let item">{{item.status}}</td>
        </ng-container>
        <ng-container matColumnDef="package">
          <th mat-header-cell *matHeaderCellDef>Package</th>
          <td mat-cell *matCellDef="let item">{{item.package}}</td>
        </ng-container>
        <ng-container matColumnDef="available_minutes">
          <th mat-header-cell *matHeaderCellDef>Available Min</th>
          <td mat-cell *matCellDef="let item">{{item.available_minutes}}</td>
        </ng-container>
        <ng-container matColumnDef="make_up_minutes">
          <th mat-header-cell *matHeaderCellDef>Make Up Min</th>
          <td mat-cell *matCellDef="let item">{{item.make_up_minutes}}</td>
        </ng-container>
        <ng-container matColumnDef="scholarship">
          <th mat-header-cell *matHeaderCellDef>Scholarship</th>
          <td mat-cell *matCellDef="let item">
            @if (item.scholarship) {
              <mat-icon style="color: green;">check</mat-icon>
            } @else {
              <mat-icon style="color: red;">close</mat-icon>
            }
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="rosterColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: rosterColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
