<div class="student-roster">
  <div class="btc-page-header">
    <h2>Student Roster</h2>
    <mat-form-field subscriptSizing="dynamic" appearance="outline" class="roster-search">
      <mat-label>Search</mat-label>
      <input matInput #rosterSearch placeholder="Student, package"
             (input)="applyFilter(rosterSearch.value)">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <mat-card appearance="outlined">
    <mat-card-content>
      @if (loading) {
        <div class="table-spinner">
          <mat-spinner [diameter]="48"></mat-spinner>
          <span class="table-spinner-label">Loading students…</span>
        </div>
      } @else {
      <div class="table-scroll">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let item">{{item.name}}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let item">
            <span class="btc-chip"
                  [class.btc-chip--ok]="item.status === 'Active Student'">{{item.status}}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="package">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Package</th>
          <td mat-cell *matCellDef="let item">{{item.package}}</td>
        </ng-container>
        <ng-container matColumnDef="make_up_minutes">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Make Up Min</th>
          <td mat-cell *matCellDef="let item">{{availableMakeup(item)}}</td>
        </ng-container>
        <ng-container matColumnDef="scholarship">
          <th mat-header-cell *matHeaderCellDef>Scholarship</th>
          <td mat-cell *matCellDef="let item">
            @if (item.scholarship) {
              <mat-icon class="icon-yes">check_circle</mat-icon>
            } @else {
              <mat-icon class="icon-no">cancel</mat-icon>
            }
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="rosterColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: rosterColumns;" (click)="openSessionsDialog(row)"></tr>
      </table>
      </div>
      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons/>
      }
    </mat-card-content>
  </mat-card>
</div>
