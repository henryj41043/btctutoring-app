<h2 mat-dialog-title>Change Password</h2>
<mat-dialog-content class="change-password-content">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Current password</mat-label>
    <input matInput [type]="hideCurrent ? 'password' : 'text'" [(ngModel)]="currentPassword" name="current" autocomplete="current-password">
    <button matIconButton matSuffix type="button" (click)="hideCurrent = !hideCurrent" [attr.aria-label]="'Toggle current password visibility'">
      <mat-icon>{{hideCurrent ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>New password</mat-label>
    <input matInput [type]="hideNew ? 'password' : 'text'" [(ngModel)]="newPassword" name="new" autocomplete="new-password">
    <button matIconButton matSuffix type="button" (click)="hideNew = !hideNew" [attr.aria-label]="'Toggle new password visibility'">
      <mat-icon>{{hideNew ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
    <mat-hint>At least 8 characters.</mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Confirm new password</mat-label>
    <input matInput [type]="hideNew ? 'password' : 'text'" [(ngModel)]="confirmPassword" name="confirm" autocomplete="new-password">
  </mat-form-field>

  @if (error) {
    <div class="change-password-error">
      <mat-icon>error_outline</mat-icon>
      <span>{{error}}</span>
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton (click)="cancel()" [disabled]="submitting">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="submitting">
    @if (submitting) {
      <mat-spinner [diameter]="18"></mat-spinner>
    } @else {
      Change Password
    }
  </button>
</mat-dialog-actions>
