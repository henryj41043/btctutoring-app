<div class="contact-dialog-container">
  <h2 mat-dialog-title>New Contact</h2>
  <mat-dialog-content class="contact-dialog-content" [formGroup]="contactForm">
    <mat-form-field>
      <mat-label>First Name</mat-label>
      <input matInput formControlName="first_name">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="last_name">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Email Address</mat-label>
      <input matInput formControlName="email" [type]="'email'">
      @if (contactForm.hasError('emailAddress')) {
        <mat-error>Valid Email Required</mat-error>
      }
    </mat-form-field>
    <mat-form-field>
      <mat-label>Phone Number</mat-label>
      <input matInput formControlName="phone_number" [type]="'tel'">
      @if (contactForm.hasError('phoneNumber')) {
        <mat-error>Valid Phone Number Required</mat-error>
      }
    </mat-form-field>
    <mat-form-field>
      <mat-label>Select Service</mat-label>
      <mat-select formControlName="service">
        @for (serviceOption of serviceOptions; track serviceOption) {
          <mat-option [value]="serviceOption">{{serviceOption}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button matButton (click)="cancel()">Cancel</button>
    <button matButton (click)="createContact()">Create</button>
  </mat-dialog-actions>
</div>
