<div class="clients-table">
  <div class="btc-page-header">
    <h2>Contacts</h2>
    <mat-form-field subscriptSizing="dynamic" appearance="outline" class="contacts-search">
      <mat-label>Search</mat-label>
      <input matInput #contactSearch placeholder="Name, email, phone, service"
             (input)="applyFilter(contactSearch.value)">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="openContactDialog()">
      <mat-icon>add</mat-icon>
      Create Contact
    </button>
  </div>

  <mat-card class="event-card" appearance="outlined">
    <mat-card-content>
      @if (loading) {
        <div class="table-spinner">
          <mat-spinner [diameter]="48"></mat-spinner>
          <span class="table-spinner-label">Loading contacts…</span>
        </div>
      } @else {
      <div class="table-scroll">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
        <ng-container matColumnDef="first_name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> First Name </th>
          <td mat-cell *matCellDef="let item"> {{item.first_name}} </td>
        </ng-container>
        <ng-container matColumnDef="last_name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Last Name </th>
          <td mat-cell *matCellDef="let item"> {{item.last_name}} </td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
          <td mat-cell *matCellDef="let item"> {{item.email}} </td>
        </ng-container>
        <ng-container matColumnDef="phone_number">
          <th mat-header-cell *matHeaderCellDef> Phone # </th>
          <td mat-cell *matCellDef="let item"> {{item.phone_number | phone}} </td>
        </ng-container>
        <ng-container matColumnDef="service">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Service </th>
          <td mat-cell *matCellDef="let item">
            @if (item.service) {
              <span class="btc-chip btc-chip--info">{{item.service}}</span>
            }
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let item">
            <button matIconButton color="warn"
                    (click)="openDeleteDialog(item); $event.stopPropagation()"
                    aria-label="Delete contact">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="contactColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: contactColumns;" (click)="contactClicked(row)"></tr>
      </table>
      </div>
      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons/>
      }
    </mat-card-content>
  </mat-card>
</div>
