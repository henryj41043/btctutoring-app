<div class="clients-table">
  <mat-card class="event-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Contacts</mat-card-title>
    </mat-card-header>
    <mat-card-actions>
      <button matButton (click)="openContactDialog()">Create Contact</button>
    </mat-card-actions>
    <mat-card-content>
      <table mat-table [dataSource]="contactData" class="mat-elevation-z8">
        <ng-container matColumnDef="first_name">
          <th mat-header-cell *matHeaderCellDef> First Name </th>
          <td mat-cell *matCellDef="let item"> {{item.first_name}} </td>
        </ng-container>
        <ng-container matColumnDef="last_name">
          <th mat-header-cell *matHeaderCellDef> Last Name </th>
          <td mat-cell *matCellDef="let item"> {{item.last_name}} </td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> Email </th>
          <td mat-cell *matCellDef="let item"> {{item.email}} </td>
        </ng-container>
        <ng-container matColumnDef="phone_number">
          <th mat-header-cell *matHeaderCellDef> Phone # </th>
          <td mat-cell *matCellDef="let item"> {{item.phone_number}} </td>
        </ng-container>
        <ng-container matColumnDef="service">
          <th mat-header-cell *matHeaderCellDef> Service </th>
          <td mat-cell *matCellDef="let item"> {{item.service}} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="contactColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: contactColumns;" (click)="contactClicked(row)"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
