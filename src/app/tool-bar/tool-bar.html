<mat-toolbar class="btc-toolbar">
  @if (authService.loggedIn()) {
    <button matIconButton class="toolbar-icon" [matMenuTriggerFor]="actionMenu" aria-label="Open navigation menu">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #actionMenu="matMenu">
      <button mat-menu-item (click)="calendarNav()">
        <mat-icon>calendar_month</mat-icon><span>Calendar</span>
      </button>
      <button mat-menu-item (click)="sessionsNav()">
        <mat-icon>event_note</mat-icon><span>Sessions</span>
      </button>
      <button mat-menu-item (click)="contactsNav()">
        <mat-icon>contacts</mat-icon><span>Contacts</span>
      </button>
      <button mat-menu-item (click)="rosterNav()">
        <mat-icon>groups</mat-icon><span>Student Roster</span>
      </button>
      <button mat-menu-item (click)="payrollNav()">
        <mat-icon>payments</mat-icon><span>Payroll</span>
      </button>
      @if (authService.isAdmin()) {
        <button mat-menu-item (click)="onboardingNav()">
          <mat-icon>how_to_reg</mat-icon><span>Onboarding</span>
        </button>
        <button mat-menu-item (click)="billingNav()">
          <mat-icon>receipt_long</mat-icon><span>Billing</span>
        </button>
      }
    </mat-menu>
  }

  <div class="brand" [class.brand--link]="authService.loggedIn()" (click)="authService.loggedIn() && calendarNav()">
    <img class="brand-logo" ngSrc="assets/BTC_Transparent_BG.png" alt="Beyond the Chalkboard Tutoring" height="100" width="100" priority/>
    <span class="brand-name">Beyond the Chalkboard Tutoring Hub</span>
  </div>

  <span class="toolbar-spacer"></span>

  @if (authService.loggedIn()) {
    <span class="welcome">Welcome, {{authService.contact().first_name}}</span>
  }

  <button matIconButton class="toolbar-icon" [matMenuTriggerFor]="accountMenu" aria-label="Account menu">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #accountMenu="matMenu" [hasBackdrop]="true">
    <div class="profile-container">
      <h3>Profile</h3>
      @if (authService.loggedIn()) {
        <p class="profile-name">{{authService.contact().first_name}} {{authService.contact().last_name}}</p>
        <button matButton class="profile-action" (click)="openChangePassword()">
          <mat-icon>lock_reset</mat-icon>
          Change Password
        </button>
      }
      <form (ngSubmit)="logout()">
        <button mat-raised-button color="primary" type="submit">Logout</button>
      </form>
    </div>
  </mat-menu>
</mat-toolbar>
