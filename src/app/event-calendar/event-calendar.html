<div class="event-calendar-header">
  <div class="cal-nav">
    <button matIconButton mwlCalendarPreviousView [view]="view" [(viewDate)]="viewDate" (viewDateChange)="closeOpenMonthViewDay()" aria-label="Previous">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <button matButton mwlCalendarToday [(viewDate)]="viewDate" class="cal-today-btn">Today</button>
    <button matIconButton mwlCalendarNextView [view]="view" [(viewDate)]="viewDate" (viewDateChange)="closeOpenMonthViewDay()" aria-label="Next">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <span class="calendar-title">{{ viewDate | calendarDate: view + 'ViewTitle' : 'en' }}</span>

  <div class="cal-actions">
    @if (authService.loggedIn() && authService.user().groups.includes('Admins')) {
      <button mat-raised-button color="primary" (click)="openCreateSessionDialog()" class="cal-add-btn">
        <mat-icon>add</mat-icon>
        Add Session
      </button>
    }
    <div class="cal-view-toggle">
      <button matButton (click)="setView(CalendarView.Month)" [class.active]="view === CalendarView.Month">Month</button>
      <button matButton (click)="setView(CalendarView.Week)" [class.active]="view === CalendarView.Week">Week</button>
      <button matButton (click)="setView(CalendarView.Day)" [class.active]="view === CalendarView.Day">Day</button>
    </div>
  </div>
</div>
<div class="event-calendar">
  @switch (view) {
    @case (CalendarView.Month) {
      <mwl-calendar-month-view
        class="event-cal-month event-cal"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        [activeDayIsOpen]="activeDayIsOpen"
        (dayClicked)="dayClicked($event.day)"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      />
    }
    @case (CalendarView.Week) {
      <mwl-calendar-week-view
        class="event-cal-week event-cal"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      />
    }
    @case (CalendarView.Day) {
      <mwl-calendar-day-view
        class="event-cal-day event-cal"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      />
    }
  }
</div>
