name: deploy.yml
on:
  push:
    branches:
      - main

jobs:
  # Post-merge safety net: re-runs the full test suite against merged main
  # (catches a bad/semantic merge that no single PR saw) before shipping.
  # The 95% coverage THRESHOLD is enforced on the PR (ci.yml) — the authoritative
  # gate — not here: re-checking a fractional coverage percentage against the
  # merged tree can disagree with the PR run and block already-reviewed, merged
  # code from deploying. So this runs `npm test` (no --coverage) to verify the
  # tests pass, without re-litigating the coverage number.
  test:
    name: Tests (post-merge safety net)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Jest unit tests
        run: npm test
      - name: Install Playwright browser
        run: npm run test:e2e:install
      - name: Playwright end-to-end (mocked API)
        run: npm run test:e2e

  deploy:
    # Nothing ships to S3/CloudFront unless every test suite passes.
    needs: test
    runs-on: ubuntu-latest
    # OIDC: assume the btctutoring-github-deploy role instead of static keys.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      # Cache strategy: hashed js/css are immutable (filenames change per build);
      # unhashed assets get a short TTL; index.html must ALWAYS revalidate or
      # browsers heuristically cache it and serve a stale bundle on next visit.
      - name: Deploy to S3
        run: |
          aws s3 sync dist/btctutoring-app/browser s3://btchub.bitshiftstudio.io --delete \
            --exclude "index.html" --exclude "*.js" --exclude "*.css" \
            --cache-control "public,max-age=3600"
          aws s3 sync dist/btctutoring-app/browser s3://btchub.bitshiftstudio.io \
            --exclude "*" --include "*.js" --include "*.css" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp dist/btctutoring-app/browser/index.html s3://btchub.bitshiftstudio.io/index.html \
            --cache-control "no-cache" --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1AN6NRNX2S4YG \
            --paths "/*"
