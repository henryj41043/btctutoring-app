name: deploy.yml
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Jest unit tests with coverage gate
        run: npm run test:cov
      - name: Install Playwright browser
        run: npm run test:e2e:install
      - name: Playwright end-to-end (mocked API)
        run: npm run test:e2e

  deploy:
    # Nothing ships to S3/CloudFront unless every test suite passes.
    needs: test
    runs-on: ubuntu-latest
    # OIDC: assume the btctutoring-github-deploy role instead of static keys.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/btctutoring-app/browser s3://btchub.bitshiftstudio.io --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1AN6NRNX2S4YG \
            --paths "/*"
