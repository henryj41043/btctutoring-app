name: CI

# Pull-request gate: every check here must pass before a PR can merge to main.
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit tests + 95% coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # Authoritative 95% coverage gate. Deploy does NOT re-check the coverage
      # percentage (see deploy.yml) — this PR check is where it's enforced.
      - name: Jest unit tests with coverage gate
        run: npm run test:cov

  e2e:
    name: Playwright end-to-end (mocked API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browser
        run: npm run test:e2e:install
      - run: npm run test:e2e

  mutation:
    name: Mutation testing (changed files only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so Stryker can diff against the PR base branch.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Stryker on changed source files vs ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only --diff-filter=AM "$BASE"...HEAD -- src \
            | grep -E '\.ts$' \
            | grep -vE '\.spec\.ts$|/models/|/enums/|/interfaces/|\.routes\.ts$|\.config\.ts$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No mutable source files changed in this PR; skipping mutation testing."
            exit 0
          fi
          echo "Mutating changed files:"; echo "$CHANGED"
          npx stryker run --mutate "$(echo "$CHANGED" | paste -sd, -)"
